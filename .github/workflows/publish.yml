name: Publish to PyPI

on:
  # Cut a release by pushing a tag like v0.1.0.
  push:
    tags: ["v*"]
  # Lets you trigger a dry-run build (no upload) from the Actions UI.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.0
        env:
          # Python 3.12, 3.13, 3.14 on CPython for all OSes.
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          # Skip 32-bit and musllinux to keep the matrix manageable.
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          # Smoke-test each built wheel.
          CIBW_TEST_EXTRAS: "test"
          CIBW_TEST_COMMAND: "python -c 'import stabrank.stabrank_core'"
          # Match repo's supported macOS deployment target.
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Upload to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Only publish on tag pushes, never on workflow_dispatch.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/stabrank

    # Trusted publishing (OIDC) — no API token in the repo.
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
