name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Check dependency lock
        if: matrix.python-version == '3.14'
        run: uv lock --check

      - name: Run regression suite
        run: uv run --extra test python -m pytest -q tests

  research-artifacts:
    name: Research artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Verify closed-form qutrit decompositions
        run: uv run python scripts/research/orbit_paper/verify_qutrit_decompositions.py

      - name: Verify closed-form qubit decompositions
        run: uv run python scripts/research/orbit_paper/verify_qubit_decompositions.py

      - name: Verify exhaustive-search certificates
        run: uv run python scripts/research/orbit_paper/verify_certificates.py --strict

      - name: Verify injection-gadget no-go (Theorem 4)
        run: uv run python scripts/research/orbit_paper/verify_gadget_no_go.py

      - name: Verify two-copy probabilistic conversion protocols
        run: uv run python scripts/research/orbit_paper/verify_two_copy_protocols.py

  paper-build:
    name: Paper build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended

      - name: Build paper PDF
        working-directory: paper
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex

  cpp-tests:
    name: C++ tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja

      - name: Build C++ tests
        run: cmake --build build

      - name: Run C++ test suite
        run: ctest --test-dir build --output-on-failure

  lean-build:
    name: Lean library
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Lean library
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean_proofs
          use-mathlib-cache: true
          test: false
